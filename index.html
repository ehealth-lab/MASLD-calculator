      const x = inputRaw.map((v, i) => (v - model.scaler_mean[i]) / model.scaler_std[i]);

      const hidden = [];
      for (let j = 0; j < 100; j++) {
        const wj = [
          model.weights[0][0][j],
          model.weights[0][1][j],
          model.weights[0][2][j],
          model.weights[0][3][j],
          model.weights[0][4][j]
        ];
        const z = dot(x, wj) + model.biases[0][j];
        hidden.push(tanh(z));
      }

      let z2 = 0;
      for (let j = 0; j < 100; j++) {
        z2 += hidden[j] * model.weights[1][j][0];
      }
      z2 += model.biases[1][0];

      const prob = sigmoid(z2);
      return { x, hidden, z2, prob };
    }

    function predict() {
      const vals = model.feature_cols.map(name => parseFloat(document.getElementById(name).value));

      if (vals.some(v => Number.isNaN(v))) {
        document.getElementById("result").innerHTML = "请先把 5 个输入都填完整。";
        document.getElementById("details").innerHTML = "";
        return;
      }

      const out = forward(vals);
      const positive = out.prob >= model.threshold;

      document.getElementById("result").innerHTML =
        `预测概率：${(out.prob * 100).toFixed(2)}%` +
        `<span class="pill ${positive ? "pos" : "neg"}">${positive ? "阳性" : "阴性"}</span>`;

      document.getElementById("details").innerHTML = `
        <p><strong>判定阈值：</strong>${model.threshold}</p>
        <p><strong>判定规则：</strong>概率 ≥ ${model.threshold} 判为阳性</p>
        <pre>标准化后输入：
${JSON.stringify({
  age_i2: out.x[0],
  height_i2: out.x[1],
  WHtR: out.x[2],
  ABSI: out.x[3],
  RFM: out.x[4]
}, null, 2)}</pre>
      `;
    }

    function fillExample() {
      document.getElementById("age_i2").value = 60;
      document.getElementById("height_i2").value = 170;
      document.getElementById("WHtR").value = 0.55;
      document.getElementById("ABSI").value = 0.08;
      document.getElementById("RFM").value = 32;
      predict();
    }

    function clearInputs() {
      model.feature_cols.forEach(id => document.getElementById(id).value = "");
      document.getElementById("result").innerHTML = "";
      document.getElementById("details").innerHTML = "";
    }
  </script>
</body>
</html>
